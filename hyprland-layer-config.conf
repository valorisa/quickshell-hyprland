# hyprland-layer-config.conf
# Source this from hyprland.conf:
#   source = ~/.config/quickshell/hyprland-layer-config.conf
#   exec-once = quickshell

# ── Layer shell animation rules ────────────────────────────
layerrule = animation fade, QuickShell
layerrule = animation slide top, QuickShell.Bar
layerrule = animation slide bottom, QuickShell.OSD

# ── Allow blur on QuickShell surfaces ─────────────────────
layerrule = blur, QuickShell
layerrule = blurpopups, QuickShell

# ── Prevent Hyprland from stealing focus from qs popups ───
layerrule = dimaround, QuickShell.ControlCenter
